remote_theme: pages-themes/hacker@v0.2.0
plugins:
  - jekyll-remote-theme

# ======================
# Site Metadata
# ======================
title: Kade Heckel
description: Musings of an Engineer.
url: "https://kmheckel.github.io"

# Author info
author:
  name: Kade Heckel
  github: kmheckel

# ======================
# Navigation
# ======================
nav:
  - title: Home
    url: /
  - title: About
    url: /about/
  - title: Blog
    url: /blog/

# ======================
# Blog / Posts
# ======================
permalink: /blog/:year/:month/:day/:title/
paginate: 5
paginate_path: "/blog/page:num/"

# ======================
# Markdown
# ======================
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
